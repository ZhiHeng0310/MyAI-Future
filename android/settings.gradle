// android/settings.gradle
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    def flutterSdkPath = null
    def propertiesFile = file("local.properties")
    if (propertiesFile.exists()) {
        def props = new Properties()
        propertiesFile.withInputStream { stream -> props.load(stream) }
        flutterSdkPath = props.getProperty('flutter.sdk')
    }
    if (flutterSdkPath == null) {
        throw new GradleException("flutter.sdk not set in local.properties")
    }

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
}

plugins {
    id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
    id 'com.android.application' version '8.11.1' apply false
    id 'org.jetbrains.kotlin.android' version '2.2.20' apply false
    id 'com.google.gms.google-services' version '4.4.0' apply false
}

rootProject.name = "careloop_v3"
include ':app'
