name: careloop
description: CareLoop - Agentic AI Patient Care System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter_dotenv: ^6.0.0
  google_generative_ai: ^0.4.7

  flutter:
    sdk: flutter

  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  http: ^1.2.1
  http_parser: ^4.0.2

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  # UI & Fonts
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  fl_chart: ^1.2.0

  # Image picking for AI photo feature
  image_picker: ^1.1.2

  # State & Utils
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
